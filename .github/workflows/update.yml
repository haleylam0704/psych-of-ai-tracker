name: Update Paper Database

on:
  schedule:
    # Run every 3 days at 6am UTC
    - cron: "0 6 */3 * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers from OpenAlex
        working-directory: scripts
        run: python fetch_papers.py

      - name: Classify with Haiku
        working-directory: scripts
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python classify_papers.py

      - name: Build site data
        working-directory: scripts
        run: python build_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/papers.json docs/data.json
          git diff --cached --quiet || git commit -m "Auto-update paper database $(date -u +%Y-%m-%d)"
          git push
